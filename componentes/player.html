<div id="audio-player" class="player-bar">
  <!-- TRACK INFO -->
  <div class="player-info">
    <span class="player-disco" id="player-disco">—</span>
    <span class="player-titulo" id="player-titulo">Seleccioná un tema</span>
  </div>

  <!-- CONTROLES -->
  <div class="player-controls">
    <button class="player-btn" id="btn-prev" aria-label="Anterior">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
      </svg>
    </button>

    <button class="player-btn play-btn" id="btn-play" aria-label="Play/Pause">
      <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor">
        <path d="M8 5v14l11-7z" />
      </svg>
      <svg
        id="icon-pause"
        viewBox="0 0 24 24"
        fill="currentColor"
        style="display: none"
      >
        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
      </svg>
    </button>

    <button class="player-btn" id="btn-next" aria-label="Siguiente">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8l-5.5 4zM16 6v12h2V6h-2z" />
      </svg>
    </button>
  </div>

  <!-- VOLUMEN -->
  <div class="player-volume">
    <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor">
      <path
        d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"
      />
    </svg>
    <input
      type="range"
      id="volume-slider"
      min="0"
      max="1"
      step="0.01"
      value="0.8"
      aria-label="Volumen"
    />
  </div>
</div>

<audio id="audio-engine" preload="metadata"></audio>
