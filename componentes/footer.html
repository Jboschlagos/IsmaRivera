<!-- PLAYER fijo al fondo -->
<div id="audio-player" class="player-bar">
  <div class="player-info">
    <span class="player-disco" id="player-disco">—</span>
    <span class="player-titulo" id="player-titulo">Seleccioná un tema</span>
  </div>

  <div class="player-controls">
    <button class="player-btn" id="btn-prev" aria-label="Anterior">⏮</button>
    <button class="player-btn play-btn" id="btn-play" aria-label="Play/Pause">
      <span id="icon-play">▶</span>
      <span id="icon-pause" style="display: none">⏸</span>
    </button>
    <button class="player-btn" id="btn-next" aria-label="Siguiente">⏭</button>
  </div>

  <div class="player-volume">
    <span class="vol-icon">🔈</span>
    <input
      type="range"
      id="volume-slider"
      min="0"
      max="1"
      step="0.01"
      value="0.8"
      aria-label="Volumen"
    />
  </div>
</div>
