<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Isma Rivera - Poeta Cantor. Música, poesía y palabra."
    />
    <title>Isma Rivera | Poeta Cantor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>

  <body>
    <!-- NAVBAR - Se carga dinámicamente -->
    <div id="navbar-container"></div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="container-fluid content">
      <section class="row g-4 mt-5 pt-5">
        <!-- Música -->
        <article class="col-12 col-md-6">
          <a href="musica.html" class="module-link">
            <figure class="module-card musica">
              <img
                src="./assets/img/12.jpg"
                alt="Obras musicales de Isma Rivera"
              />
              <figcaption class="module-overlay">
                <div class="module-text">
                  <h2>Música</h2>
                  <p>Discos y canciones</p>
                </div>
                <div class="module-meta"><span>Explorar Musica a</span></div>
              </figcaption>
            </figure>
          </a>
        </article>

        <!-- Poesía -->
        <article class="col-12 col-md-6">
          <a href="poesia.html" class="module-link">
            <figure class="module-card poesia">
              <img
                src="./assets/img/Cafebreria 6.jpeg"
                alt="Obras poéticas de Isma Rivera"
              />
              <figcaption class="module-overlay">
                <div class="module-text">
                  <h2>Poesía</h2>
                  <p>Libros y textos</p>
                </div>
                <div class="module-meta">
                  <span>Explorar publicaciones</span>
                </div>
              </figcaption>
            </figure>
          </a>
        </article>
      </section>
    </main>

    <!-- FOOTER - Se carga dinámicamente -->
    <div id="footer-container"></div>

    <!-- JS - IMPORTANTE: data.js y components.js ANTES de intro.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./assets/js/data.js"></script>
    <script src="./assets/js/componentes.js"></script>
    <script src="./assets/js/intro.js"></script>
  </body>
</html>
