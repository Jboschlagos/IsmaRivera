<!-- PLAYER + FOOTER como bloque único pegado al fondo -->
<div class="footer-wrapper">
  <!-- PLAYER -->
  <div id="audio-player" class="player-bar">
    <div class="player-info">
      <span class="player-disco" id="player-disco">—</span>
      <span class="player-titulo" id="player-titulo">Seleccioná un tema</span>
    </div>

    <div class="player-controls">
      <button class="player-btn" id="btn-prev" aria-label="Anterior">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6 8.5 6V6z" />
        </svg>
      </button>
      <button class="player-btn play-btn" id="btn-play" aria-label="Play/Pause">
        <svg id="icon-play" viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z" />
        </svg>
        <svg
          id="icon-pause"
          viewBox="0 0 24 24"
          fill="currentColor"
          style="display: none"
        >
          <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
        </svg>
      </button>
      <button class="player-btn" id="btn-next" aria-label="Siguiente">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zm2.5-6 5.5 4V8l-5.5 4zM16 6v12h2V6h-2z" />
        </svg>
      </button>
    </div>

    <div class="player-volume">
      <svg class="vol-icon" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M3 9v6h4l5 5V4L7 9H3zm13.5 3A4.5 4.5 0 0 0 14 7.97v8.05c1.48-.73 2.5-2.25 2.5-4.02z"
        />
      </svg>
      <input
        type="range"
        id="volume-slider"
        min="0"
        max="1"
        step="0.01"
        value="0.8"
        aria-label="Volumen"
      />
    </div>
  </div>

  <audio id="audio-engine" preload="metadata"></audio>

  <!-- FOOTER -->
  <footer id="contacto" class="footer bg-black text-white py-4">
    <div class="container">
      <div class="row text-center text-md-start align-items-center">
        <div class="col-md-4 mb-3 mb-md-0">
          <h6 class="text-uppercase">Contacto</h6>
          <p class="mb-1">
            <a
              href="mailto:contacto@ismarivera.com"
              class="text-white text-decoration-none"
            >
              contacto@ismarivera.com
            </a>
          </p>
          <a
            href="https://wa.me/56912345678"
            class="text-white text-decoration-none"
            target="_blank"
            >WhatsApp</a
          >
        </div>

        <div class="col-md-4 mb-3 mb-md-0 text-center">
          <h6 class="text-uppercase">Redes</h6>
          <a
            href="https://instagram.com/ismarivera"
            target="_blank"
            class="text-white me-3 text-decoration-none"
            >Instagram</a
          >
          <a
            href="https://youtube.com/@ismarivera"
            target="_blank"
            class="text-white me-3 text-decoration-none"
            >YouTube</a
          >
          <a
            href="https://ismarivera.bandcamp.com"
            target="_blank"
            class="text-white text-decoration-none"
            >Bandcamp</a
          >
        </div>

        <div class="col-md-4 text-md-end text-center">
          <h6 class="text-uppercase">Escuchar</h6>
          <a
            href="https://open.spotify.com/intl-es/artist/1m1mEMI4Yw5jr8aoguhgy8"
            target="_blank"
            class="btn btn-outline-light btn-sm"
            >Spotify</a
          >
        </div>
      </div>

      <hr class="border-secondary my-3" />

      <div class="text-center small opacity-75">
        © Isma Rivera – Poeta Cantor
      </div>
    </div>
  </footer>
</div>
